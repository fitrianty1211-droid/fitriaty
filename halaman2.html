<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Biodata, Rekening, dan Transaksi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #486341;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 750px;
      margin: auto;
      background: rgb(89, 124, 88);
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(150, 74, 74, 0.1);
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #110e0e;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }

    .radio-group label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
      margin-bottom: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: rgb(173, 161, 161);
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #0056b3;
    }

    hr {
      margin: 25px 0;
    }

    small {
      color: #7a7676;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Form Biodata, Rekening, dan Transaksi</h2>

    <form action="#" method="post">
      <div class="form-group">
        <label for="nama">Nama</label>
        <input type="text" id="nama" name="nama"  required>
      </div>

      <div class="form-group">
        <label for="umur">Umur</label>
        <input type="number" id="umur" name="umur" min="1"  required>
      </div>

      <div class="form-group">
        <label>Jenis Kelamin</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="jenis_kelamin" value="Laki-laki" checked>
            Laki-laki
          </label>
          <label>
            <input type="radio" name="jenis_kelamin" value="Perempuan">
            Perempuan
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="alamat">Alamat</label>
        <textarea id="alamat" name="alamat" rows="3" ></textarea>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email">

      <div class="form-group">
        <label for="telepon">Nomor Telepon</label>
        <input type="tel" id="telepon" name="telepon">

      <div class="form-group">
        <label for="pendidikan">Pendidikan</label>
        <select id="pendidikan" name="pendidikan" required>
          <option value="">-- Pilih Pendidikan --</option>
          <option value="SD">SD</option>
          <option value="SMP">SMP</option>
          <option value="SMA/SMK">SMA/SMK</option>
          <option value="D3">D3</option>
          <option value="S1">S1</option>
          <option value="S2">S2</option>
          <option value="S3">S3</option>
        </select>
      </div>
<div style="margin-bottom: 20px;">
        <a href="halaman3.html" style="text-decoration: none;">
            <button type="button" style="background-color: #fbec66; color:#2c3e50; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">
             Lanjutkan
            </button>
        </a>
    </div>
    <div id="output"></div>
    <div style="margin-bottom: 20px;">
        <a href="fixxxxxxx.html" style="text-decoration: none;">
            <button type="button" style="background-color: #fbec66; color:#2c3e50; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">
             Kembali 
            </button>
        </a>
    </div>
    <div id="output"></div>
    
</body>
</html>
