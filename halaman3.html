<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitriaty</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #486341;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 750px;
      margin: auto;
      background: rgb(89, 124, 88);
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(150, 74, 74, 0.1);
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #110e0e;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }

    .radio-group label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
      margin-bottom: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: rgb(173, 161, 161);
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #0056b3;
    }

    hr {
      margin: 25px 0;
    }

    small {
      color: #7a7676;
    }
  </style>
</head>
<body>
  <header>

    <div class="form-group">
        <label for="nama_bank">Nama Bank</label>
        <input type="text" id="nama_bank" name="nama_bank">

        <input type="text" id="nomor_rekening" name="nomor_rekening">

             Lanjutkan
            </button>
        </a>
    
      <hr>
